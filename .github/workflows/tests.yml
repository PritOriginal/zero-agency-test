name: Tests Workflow
on:
  push:
    branches: [ "main" ]
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4  

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.26.0'
      
      - name: Start tests
        run: |
          go test ./... -coverprofile cover.test.tmp -coverpkg ./...
          cat cover.test.tmp | grep -v "mocks" > cover.test 
          rm cover.test.tmp 
          go tool cover -func cover.test 
